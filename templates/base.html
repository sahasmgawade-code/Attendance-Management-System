<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <style>
        body {
            background-image: url('{{ url_for("static", filename="images/College Background.png") }}');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }

        /* Mobile: disable fixed background (causes blank screen on iOS) */
        @media (max-width: 768px) {
            body {
                background-attachment: scroll;
            }
        }

        /* Make all tables horizontally scrollable on small screens */
        .table-responsive-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* Prevent buttons from overflowing */
        .btn {
            white-space: normal;
            word-break: break-word;
        }
    </style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Attendance Management System</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/ADYPU_LOGO.png') }}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>
    <div style="
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.5);
    z-index: 0;
"></div>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark" style="position: relative; z-index: 2;">
        <div class="container-sm px-3">

            <!-- Brand -->
            <a class="navbar-brand d-flex align-items-center" href="{{ url_for('home.home') }}">
                <img src="{{ url_for('static', filename='images/ADYPU.png') }}" alt="Logo" width="35" height="35"
                    class="me-2">
                <div>
                    <div class="fw-bold" style="font-size: 0.95rem; line-height: 1.1;">ADYPU Attendance</div>
                    <div style="font-size: 0.7rem; opacity: 0.7;">Ajeenkya DY Patil University</div>
                </div>
            </a>

            <!-- Mobile Toggle -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Nav Links -->
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'home.home' %}active{% endif %}"
                            href="{{ url_for('home.home') }}">
                            Dashboard
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'reports.reports' %}active{% endif %}"
                            href="{{ url_for('reports.reports') }}">
                            Reports
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'edit.edit_attendance' %}active{% endif %}"
                            href="{{ url_for('edit.edit_attendance') }}">
                            Edit Attendance
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'past.past_attendance' %}active{% endif %}"
                            href="{{ url_for('past.past_attendance') }}">
                            Past Attendance
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'checkin.generate' %}active{% endif %}"
                            href="{{ url_for('checkin.generate') }}">
                            Generate QR
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'reports.today_attendance' %}active{% endif %}"
                        href="{{ url_for('reports.today_attendance') }}">
                        Today's Attendance
                    </a>
                </li>
                {% if session.get('logged_in') %}
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('auth.logout') }}">Logout</a>
                </li>
                {% endif %}

                </ul>

                </ul>
            </div>

        </div>
    </nav>

    <!-- Page Content -->
    <div class="container-sm px-3 mt-4" style="position: relative; z-index: 1;">
        {% block content %}
        {% endblock %}
    </div>

    <!-- Bootstrap JS for mobile toggle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
